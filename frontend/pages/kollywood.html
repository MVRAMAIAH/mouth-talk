<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../assets/js/auth-guard.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTALK – Kollywood</title>
    <link rel="icon" href="https://t3.ftcdn.net/jpg/06/76/63/78/360_F_676637882_ywOxjtsIXUK79F6lKVtXAwYiI9zZ2h3H.jpg" type="image/png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Design System -->
    <link rel="stylesheet" href="../assets/css/performance.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/premium-buttons.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/nav-search.css">
    <link rel="stylesheet" href="../assets/css/notifications.css">
    <link rel="stylesheet" href="../assets/css/beast-mode.css">
    <link rel="manifest" href="../manifest.json">
    <style>
        body {
            padding-bottom: 80px;
        }

        .page-header {
            margin-top: 120px;
            text-align: center;
        }

        .page-header h1 {
            text-shadow: 0 0 10px var(--mt-primary-glow);
            position: relative;
            display: inline-block;
        }

        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, var(--mt-primary), var(--mt-cyan));
            border-radius: 2px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 24px;
            padding: var(--sp-6);
            max-width: 1200px;
            margin: var(--sp-6) auto;
        }

        .movie-box {
            display: block;
            border: 1px solid var(--mt-border-accent);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-spring);
            text-decoration: none;
            color: var(--mt-text-primary);
            position: relative;
            background: var(--mt-surface);
            backdrop-filter: blur(10px);
        }

        .movie-box:hover {
            border-color: var(--mt-primary);
            box-shadow: 0 0 15px var(--mt-primary-glow), var(--shadow-md);
            transform: translateY(-8px);
        }

        .movie-box img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
            transition: transform var(--duration-normal) ease;
        }

        .movie-box:hover img {
            transform: scale(1.05);
        }

        .movie-title {
            text-align: center;
            padding: var(--sp-2) var(--sp-2);
            font-size: var(--fs-xs);
            font-family: var(--font-display);
            font-weight: 700;
            background: rgba(10, 10, 10, 0.95);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: capitalize;
            color: var(--mt-text-primary);
            border-top: 1px solid var(--mt-border);
        }

        .empty-msg {
            text-align: center;
            padding: var(--sp-10);
            color: var(--mt-text-muted);
            font-size: var(--fs-md);
            font-family: var(--font-body);
        }

        @media (max-width: 768px) {
            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 16px;
                padding: var(--sp-4);
            }
        }
    </style>
</head>

<body>
    <a href="#main" class="skip-link">Skip to movies</a>
    <div class="ambient-glow"></div>

    <header class="site-header">
        <a href="../index.html" class="site-logo">MTALK</a>
        <button class="hamburger-btn" aria-label="Toggle navigation menu" onclick="toggleMenu()">☰</button>
        <nav class="site-nav" aria-label="Main navigation">
            <button class="add-movie-btn admin-only premium-btn" onclick="openModal()" style="display: none;">+ Add Movie</button>
            <a href="../index.html">Home</a>
            <a href="profile.html">Profile</a>
            <a href="location.html">Location</a>
            <a href="about.html">About</a>
        </nav>
    </header>
    
    <!-- Admin modal container -->
    <div id="admin-modal-container"></div>

    <main id="main" class="site-main">
        <div class="page-header">
            <h1>Running Movies – Kollywood</h1>
        </div>
        <div id="movieGrid" class="movie-grid">
            <!-- Skeletons will go here initially if needed, or just let JS populate -->
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-brand">MTALK</div>
        <p class="footer-tagline">Its word of mouth</p>
        <div class="footer-links">
            <a href="about.html">About</a>
            <a href="../index.html">Home</a>
        </div>
        <p class="footer-copy">© 2026 MTALK. All rights reserved.</p>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js" defer></script>
    <script src="../assets/js/firebase-init.js" defer></script>
    <script src="../assets/js/admin.js" defer></script>
    <script src="../assets/js/toast.js" defer></script>
    <script src="../assets/js/premium-buttons.js" defer></script>
    <script src="../assets/js/responsive.js"></script>
    <script src="../assets/js/nav-search.js" defer></script>
    <script src="../assets/js/notifications.js" defer></script>
    <script src="../assets/js/beast-mode-nav.js" defer></script>

    <script>
        let globalUser = null;
        
        function updateUIWithUser(user) {
            if (!user) return;
            globalUser = user;
            const profileLink = Array.from(document.querySelectorAll('.site-nav a')).find(a => a.href.includes('profile.html'));
            if (profileLink) profileLink.textContent = user.fullName.split(' ')[0] + "'s Profile";

            if (user.isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
                if (typeof injectAdminModal === 'function') injectAdminModal();
            }
        }

        const CATEGORY = 'kollywood';

        async function loadMovies() {
            try {
                const res = await fetch('/api/movies');
                if (!res.ok) throw new Error('API fetch failed');
                const movies = (await res.json()).filter(m => (m.category || '').toLowerCase() === CATEGORY);
                const grid = document.getElementById('movieGrid');
                grid.innerHTML = '';

                if (movies.length === 0) {
                    grid.innerHTML = '<p class="empty-msg">No movies found in this category yet.</p>';
                    return;
                }

                movies.forEach(m => {
                    const container = document.createElement('div');
                    container.className = 'movie-box';
                    
                    const a = document.createElement('a');
                    a.href = `movie.html?id=${encodeURIComponent(m.id)}`;
                    a.style.textDecoration = 'none';
                    a.style.color = 'inherit';
                    a.style.display = 'block';

                    const imgWrapper = document.createElement('div');
                    imgWrapper.style.overflow = 'hidden';

                    const img = document.createElement('img');
                    img.alt = m.title || 'Poster';
                    const filename = m.poster.includes('.') ? m.poster : m.poster + '.jpg';
                    img.src = m.poster.startsWith('http') ? m.poster : `../assets/images/${encodeURIComponent(filename)}`;
                    img.loading = 'lazy';
                    img.decoding = 'async';

                    imgWrapper.appendChild(img);

                    const title = document.createElement('div');
                    title.className = 'movie-title';
                    title.textContent = m.title || 'Untitled';

                    a.appendChild(imgWrapper);
                    a.appendChild(title);
                    container.appendChild(a);

                    if (globalUser && globalUser.isAdmin) {
                        const editBtn = document.createElement('div');
                        editBtn.className = 'edit-overlay premium-btn';
                        editBtn.textContent = 'EDIT';
                        editBtn.onclick = (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            if (typeof openModal === 'function') openModal(m);
                        };
                        container.appendChild(editBtn);
                    }

                    grid.appendChild(container);
                });
            } catch (err) {
                console.error('loadMovies error', err);
                document.getElementById('movieGrid').innerHTML =
                    '<p class="empty-msg" style="color:var(--mt-error)">Could not load movies.</p>';
            }
        }

        async function init() {
            // Use cached user if available from guard
            if (window.__USER__) {
                updateUIWithUser(window.__USER__);
            } else {
                window.addEventListener('authReady', (e) => updateUIWithUser(e.detail), { once: true });
            }
            
            await loadMovies();
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof injectAdminModal === 'function' && document.getElementById('admin-modal-container')) {
                injectAdminModal();
            }
            init();
        });
    </script>
</body>
</html>
