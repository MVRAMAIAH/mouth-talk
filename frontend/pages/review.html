<!DOCTYPE html>
<html lang="en">

<head>
  <script src="../assets/js/auth-guard.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mouth Talk – Reviews</title>
  <link rel="icon" href="https://t3.ftcdn.net/jpg/06/76/63/78/360_F_676637882_ywOxjtsIXUK79F6lKVtXAwYiI9zZ2h3H.jpg"
    type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/performance.css" />
  <link rel="stylesheet" href="../assets/css/premium-buttons.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/nav-search.css" />
  <link rel="stylesheet" href="../assets/css/notifications.css" />
  <link rel="stylesheet" href="../assets/css/beast-mode.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/review.css" />
</head>

<body>
  <a href="#page-content" class="skip-link">Skip to reviews</a>
  <div class="ambient-glow"></div>
  <header class="site-header">
    <a href="../index.html" class="site-logo">MTALK</a>
    <button class="hamburger-btn" aria-label="Toggle navigation menu" onclick="toggleMenu()">☰</button>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="../index.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="location.html">Location</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <!-- PAGE -->
  <main class="site-main page-wrapper" id="page-content">
    <h1 class="page-title" id="movieHeading">Movie Reviews</h1>

    <div class="opinion-bar">
      <button class="opinion-btn premium-btn" onclick="openVerifyModal()">🎬 My Opinion</button>
    </div>

    <div class="badge-filter-bar">
      <label for="badgeFilter">Filter by Tribe</label>
      <select class="badge-select" id="badgeFilter" onchange="onBadgeFilterChange()">
        <option value="">All Badges</option>
        <option value="rocky">💪 Rocky</option>
        <option value="ram">🌸 Ram</option>
        <option value="shivaji">🏛️ Shivaji</option>
        <option value="anil">👨‍👩‍👧‍👦 Anil</option>
      </select>
    </div>

    <div id="reviewsFeed" class="reviews-feed">
      <p class="empty-state">Loading reviews...</p>
    </div>
  </div>

  <!-- MODAL: BOOKING VERIFICATION -->
  <div id="verifyModal" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModals()">&times;</button>
      <h2>Verify Your Booking</h2>
      <p style="color:#aaa;font-size:0.7rem;margin-bottom:12px" id="verifyMovieLabel">Movie: —</p>
      <label for="bookingInput">Booking ID (10 characters)</label>
      <input type="text" id="bookingInput" class="premium-input" maxlength="10" placeholder="e.g. AB12CD34EF"
        oninput="this.value = this.value.toUpperCase()" autocomplete="off" />
      <p id="verifyError" class="modal-error"></p>
      <button class="modal-btn premium-btn" id="verifyBtn" onclick="verifyBooking()">Verify</button>
    </div>
  </div>

  <!-- MODAL: WRITE REVIEW -->
  <div id="reviewModal" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModals()">&times;</button>
      <h2>🎬 My Opinion</h2>

      <div class="info-row">
        <div class="info-box">
          <div class="info-label">Movie</div>
          <div class="info-value" id="rmMovieName">—</div>
        </div>
        <div class="info-box">
          <div class="info-label">Booking</div>
          <div class="info-value" id="rmBookingId" style="font-size:0.65rem">—</div>
        </div>
      </div>

      <label for="rmName">Your Name</label>
      <input type="text" id="rmName" class="premium-input" placeholder="Enter your name" autocomplete="off" />

      <label>Your Rating</label>
      <div class="star-picker" id="starPicker">
        <span data-v="1">★</span>
        <span data-v="2">★</span>
        <span data-v="3">★</span>
        <span data-v="4">★</span>
        <span data-v="5">★</span>
      </div>

      <label for="reviewText">Your Review</label>
      <textarea id="reviewText" class="premium-input" placeholder="Share your thoughts about the movie..."></textarea>

      <p id="reviewError" class="modal-error"></p>
      <button class="modal-btn premium-btn" id="submitReviewBtn" onclick="submitReview()">Post Review</button>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js" defer></script>
  <script src="../assets/js/firebase-init.js" defer></script>
  <script src="../assets/js/responsive.js" defer></script>
  <script src="../assets/js/nav-search.js" defer></script>
  <script src="../assets/js/notifications.js" defer></script>
  <script src="../assets/js/toast.js" defer></script>
  <script src="../assets/js/beast-mode-nav.js" defer></script>

  <script>
    // Badge map
    const BADGE_MAP = {
      rocky: { emoji: '💪', name: 'ROCKY' },
      ram: { emoji: '🌸', name: 'RAM' },
      shivaji: { emoji: '🏛️', name: 'SHIVAJI' },
      anil: { emoji: '👨‍👩‍👧‍👦', name: 'ANIL' }
    };

    // Auth Guard
    let currentUser = null;
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (!res.ok) window.location.href = 'login.html';
        else {
          currentUser = await res.json();
          const profileLink = Array.from(document.querySelectorAll('.nav-links a')).find(a => a.href.includes('profile.html'));
          if (profileLink) profileLink.textContent = currentUser.fullName.split(' ')[0] + "'s Profile";

          // Default badge filter to user's own badge
          if (currentUser.badge) {
            document.getElementById('badgeFilter').value = currentUser.badge;
          }
        }
      } catch (e) {
        window.location.href = 'login.html';
      }
    }

    // ─── STATE ───
    let verifiedBookingId = null;
    let verifiedMovieId = null;
    let verifiedMovieTitle = null;
    let selectedRating = 0;
    let pageMovieId = null;
    let pageMovieTitle = null;

    // ─── GET MOVIE FROM URL ───
    function getMovieIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('movieId') || params.get('movie') || null;
    }

    // ─── INIT MOVIE CONTEXT ───
    async function initMovieContext() {
      pageMovieId = getMovieIdFromUrl();
      if (!pageMovieId) {
        document.getElementById('reviewsFeed').innerHTML = '<p class="empty-state" style="color:#f55">No movie selected. Please open this page from a movie page.</p>';
        const opBtn = document.querySelector('[onclick="openVerifyModal()"]');
        if (opBtn) opBtn.style.display = 'none';
        return;
      }
      try {
        const res = await fetch('/api/movies');
        const movies = await res.json();
        const movie = movies.find(m => m.id === pageMovieId);
        pageMovieTitle = movie ? movie.title : pageMovieId;
      } catch (e) {
        pageMovieTitle = pageMovieId;
      }
      // Update page title and header
      document.title = pageMovieTitle + ' Reviews · MTALK';
      const heading = document.getElementById('movieHeading');
      if (heading) heading.textContent = pageMovieTitle + ' — Reviews';
      loadReviews();
    }

    // ─── BADGE FILTER HANDLER ───
    function onBadgeFilterChange() {
      loadReviews();
    }

    // ─── LOAD REVIEWS (filtered by movie + badge) ───
    async function loadReviews() {
      const feed = document.getElementById('reviewsFeed');
      if (!pageMovieId) return;
      try {
        const badge = document.getElementById('badgeFilter').value;
        let url = `/api/reviews?movieId=${encodeURIComponent(pageMovieId)}`;
        if (badge) url += `&badge=${encodeURIComponent(badge)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Failed');
        const reviews = await res.json();

        if (reviews.length === 0) {
          const badgeName = badge && BADGE_MAP[badge] ? BADGE_MAP[badge].name : '';
          feed.innerHTML = `<p class="empty-state">No reviews yet${badgeName ? ' from ' + badgeName + ' tribe' : ''}. Be the first to share your opinion!</p>`;
          return;
        }

        feed.innerHTML = reviews.map(r => {
          const badgeHtml = r.userBadge && BADGE_MAP[r.userBadge]
            ? `<span class="review-badge"><span class="review-badge-emoji">${BADGE_MAP[r.userBadge].emoji}</span> ${BADGE_MAP[r.userBadge].name}</span>`
            : '';

          const likeClass = r.userReaction === 'like' ? 'liked' : '';
          const dislikeClass = r.userReaction === 'dislike' ? 'disliked' : '';

          return `
                    <div class="review-card" data-id="${r._id}">
                        <div class="review-header">
                            <span class="review-movie">${esc(r.movieTitle)}</span>
                            <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                        </div>
                        <div class="review-user">by <a href="user-details.html?id=${r.uid || ''}" style="color:inherit; text-decoration:none; font-weight:bold; border-bottom:1px solid transparent; transition:0.3s;" onmouseover="this.style.borderColor='#FF073A';this.style.color='#FF073A'" onmouseout="this.style.borderColor='transparent';this.style.color='inherit'">${esc(r.userName)}</a> ${badgeHtml}</div>
                        <div class="review-text">${esc(r.text)}</div>
                        <div class="review-actions">
                            <button class="react-btn ${likeClass}" onclick="react('${r._id}','like', this)">
                                👍 <span>${r.likes || 0}</span>
                            </button>
                            <button class="react-btn ${dislikeClass}" onclick="react('${r._id}','dislike', this)">
                                👎 <span>${r.dislikes || 0}</span>
                            </button>
                            <button class="react-btn mouth-btn" onclick="toggleComments('${r._id}')">
                                👄 <span class="comment-count-label">Comments</span>
                            </button>
                            <span class="review-date">${formatDate(r.createdAt)}</span>
                        </div>
                        <div class="comments-section" id="comments-${r._id}">
                            <div class="comments-list" id="comments-list-${r._id}">
                                <p style="font-size:0.7rem;color:#555;text-align:center">Loading comments...</p>
                            </div>
                            <div class="comment-form">
                                <input type="text" class="comment-input" id="comment-input-${r._id}" placeholder="Write a comment..." onkeypress="if(event.key==='Enter') submitComment('${r._id}')">
                                <button class="comment-submit" onclick="submitComment('${r._id}')" id="comment-btn-${r._id}">Post</button>
                            </div>
                        </div>
                    </div>
                `;
        }).join('');
      } catch (err) {
        console.error(err);
        feed.innerHTML = '<p class="empty-state" style="color:#f55">Could not load reviews.</p>';
      }
    }

    // ─── REACTIONS ───
    async function react(reviewId, type, btn) {
      if (!currentUser) {
        showLoginToast();
        return;
      }

      const card = btn.closest('.review-card');
      const btns = card.querySelectorAll('.react-btn');
      const likeBtn = btns[0];
      const dislikeBtn = btns[1];
      const likeSpan = likeBtn.querySelector('span');
      const dislikeSpan = dislikeBtn.querySelector('span');

      const isLike = type === 'like';
      const otherBtn = isLike ? dislikeBtn : likeBtn;
      const selfClass = isLike ? 'liked' : 'disliked';
      const otherClass = isLike ? 'disliked' : 'liked';

      // Store initial state for rollback
      const initialLikes = parseInt(likeSpan.textContent) || 0;
      const initialDislikes = parseInt(dislikeSpan.textContent) || 0;
      const initialSelfActive = btn.classList.contains(selfClass);
      const initialOtherActive = otherBtn.classList.contains(otherClass);

      let currentLikes = initialLikes;
      let currentDislikes = initialDislikes;

      // Optimistic UI update
      if (initialSelfActive) {
        // Toggle off
        btn.classList.remove(selfClass);
        if (isLike) currentLikes--; else currentDislikes--;
      } else {
        // Toggle on
        btn.classList.add(selfClass);
        if (isLike) currentLikes++; else currentDislikes++;

        // Remove other if active (mutual exclusive)
        if (initialOtherActive) {
          otherBtn.classList.remove(otherClass);
          if (isLike) currentDislikes--; else currentLikes--;
        }
      }

      likeSpan.textContent = Math.max(0, currentLikes);
      dislikeSpan.textContent = Math.max(0, currentDislikes);

      try {
        const res = await fetch(`/api/reviews/${reviewId}/react`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type })
        });

        if (!res.ok) throw new Error('Action failed');

        const updated = await res.json();

        // Final sync with server result
        likeSpan.textContent = updated.likes || 0;
        dislikeSpan.textContent = updated.dislikes || 0;

        likeBtn.classList.toggle('liked', updated.userReaction === 'like');
        dislikeBtn.classList.toggle('disliked', updated.userReaction === 'dislike');

      } catch (err) {
        console.error('React error:', err);

        // Rollback on error
        likeSpan.textContent = initialLikes;
        dislikeSpan.textContent = initialDislikes;
        likeBtn.classList.toggle('liked', initialSelfActive && isLike || initialOtherActive && !isLike);
        dislikeBtn.classList.toggle('disliked', initialSelfActive && !isLike || initialOtherActive && isLike);

        showToast('System busy. Reaction could not be saved.');
      }
    }

    // ─── VERIFY BOOKING ───
    function openVerifyModal() {
      if (!pageMovieId) {
        alert('No movie selected. Please open this page from a movie page.');
        return;
      }
      document.getElementById('verifyModal').classList.add('active');
      document.getElementById('verifyMovieLabel').textContent = 'Movie: ' + (pageMovieTitle || pageMovieId);
      document.getElementById('bookingInput').value = '';
      document.getElementById('verifyError').textContent = '';
    }

    async function verifyBooking() {
      const id = document.getElementById('bookingInput').value.trim();
      const errEl = document.getElementById('verifyError');
      const btn = document.getElementById('verifyBtn');

      if (id.length !== 10) {
        errEl.textContent = 'Booking ID must be exactly 10 characters';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verifying...';
      errEl.textContent = '';

      try {
        const res = await fetch('/api/verify-booking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bookingId: id, movieId: pageMovieId })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Verification failed';
          btn.disabled = false;
          btn.textContent = 'Verify';
          return;
        }

        verifiedBookingId = data.bookingId;
        verifiedMovieId = data.movieId;
        verifiedMovieTitle = data.movieTitle;

        document.getElementById('verifyModal').classList.remove('active');
        openReviewModal();
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
      }
      btn.disabled = false;
      btn.textContent = 'Verify';
    }

    // ─── REVIEW FORM ───
    function openReviewModal() {
      document.getElementById('rmName').value = currentUser ? currentUser.fullName : '';
      document.getElementById('rmMovieName').textContent = verifiedMovieTitle || '—';
      document.getElementById('rmBookingId').textContent = verifiedBookingId || '—';
      document.getElementById('reviewText').value = '';
      document.getElementById('reviewError').textContent = '';
      selectedRating = 0;
      updateStars();
      document.getElementById('reviewModal').classList.add('active');
    }

    // Star picker
    document.getElementById('starPicker').addEventListener('click', e => {
      if (e.target.dataset.v) {
        selectedRating = parseInt(e.target.dataset.v);
        updateStars();
      }
    });

    function updateStars() {
      document.querySelectorAll('#starPicker span').forEach(s => {
        s.classList.toggle('active', parseInt(s.dataset.v) <= selectedRating);
      });
    }

    async function submitReview() {
      const userName = document.getElementById('rmName').value.trim();
      const text = document.getElementById('reviewText').value.trim();
      const errEl = document.getElementById('reviewError');
      const btn = document.getElementById('submitReviewBtn');

      if (!userName) { errEl.textContent = 'Please enter your name'; return; }
      if (selectedRating === 0) { errEl.textContent = 'Please select a rating'; return; }
      if (text.length < 10) { errEl.textContent = 'Review must be at least 10 characters'; return; }

      btn.disabled = true;
      btn.textContent = 'Posting...';
      errEl.textContent = '';

      try {
        const res = await fetch('/api/reviews', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            bookingId: verifiedBookingId,
            movieId: verifiedMovieId,
            movieTitle: verifiedMovieTitle,
            userName,
            rating: selectedRating,
            text,
            userBadge: currentUser ? currentUser.badge : null
          })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Failed to post review';
          btn.disabled = false;
          btn.textContent = 'Post Review';
          return;
        }

        // Success
        closeModals();
        loadReviews(); // Refresh feed
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
      }
      btn.disabled = false;
      btn.textContent = 'Post Review';
    }

    // ─── MODAL UTILS ───
    function closeModals() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
      verifiedBookingId = null;
      verifiedMovieId = null;
      verifiedMovieTitle = null;
    }

    // Close on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) closeModals();
      });
    });

    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModals();
    });

    // ─── COMMENTS ───
    async function toggleComments(reviewId) {
      const section = document.getElementById(`comments-${reviewId}`);
      if (!section) return;
      section.classList.toggle('active');
      if (section.classList.contains('active')) {
        loadComments(reviewId);
      }
    }

    async function loadComments(reviewId) {
      const list = document.getElementById(`comments-list-${reviewId}`);
      if (!list) return;
      try {
        const res = await fetch(`/api/reviews/${reviewId}/comments`);
        if (!res.ok) throw new Error('Fetch failed');
        const comments = await res.json();

        if (comments.length === 0) {
          list.innerHTML = '<p style="font-size:0.7rem;color:#555;text-align:center">No comments yet. Say something!</p>';
        } else {
          // Group comments by parentId
          const baseComments = comments.filter(c => !c.parentId);
          const replies = comments.filter(c => c.parentId);

          list.innerHTML = baseComments.map(c => {
            const badge = c.userBadge && BADGE_MAP[c.userBadge] ? BADGE_MAP[c.userBadge] : null;
            const badgeHtml = badge ? `<span class="comment-badge">
              <span class="review-badge-emoji">${badge.emoji}</span> ${badge.name}</span>` : '';
            const avatarHtml = buildAvatarHtml(c.userAvatar, c.userName);
            const timeHtml = c.createdAt ? `<span class="comment-timestamp">${formatCommentTime(c.createdAt)}</span>` : '';

            const likeClass = c.userReaction === 'like' ? 'liked' : '';
            const dislikeClass = c.userReaction === 'dislike' ? 'disliked' : '';

            const commentReplies = replies.filter(r => r.parentId === c._id);
            const repliesHtml = commentReplies.map(r => {
              const rBadge = r.userBadge && BADGE_MAP[r.userBadge] ? BADGE_MAP[r.userBadge] : null;
              const rBadgeHtml = rBadge ? `<span class="comment-badge">
                <span class="review-badge-emoji">${rBadge.emoji}</span> ${rBadge.name}</span>` : '';
              const rAvatarHtml = buildAvatarHtml(r.userAvatar, r.userName);
              const rTimeHtml = r.createdAt ? `<span class="comment-timestamp">${formatCommentTime(r.createdAt)}</span>` : '';

              const rLikeClass = r.userReaction === 'like' ? 'liked' : '';
              const rDislikeClass = r.userReaction === 'dislike' ? 'disliked' : '';

              const rDeleteBtn = currentUser && currentUser.isAdmin
                ? `<button class="comment-delete-btn" onclick="deleteComment('${r._id}','${reviewId}')" title="Delete reply">🗑️</button>`
                : '';

              return `
                <div class="comment-item comment-reply" id="comment-${r._id}">
                  <div class="comment-user">${rAvatarHtml} <span class="comment-name">${esc(r.userName || 'Anonymous')}</span> ${rBadgeHtml} ${rTimeHtml} ${rDeleteBtn}</div>
                  <div class="comment-text">${esc(r.text)}</div>
                  <div class="comment-actions">
                    <button class="comment-react-btn ${rLikeClass}" onclick="reactToComment('${r._id}','like', this)">
                      👍 <span>${r.likes || 0}</span>
                    </button>
                    <button class="comment-react-btn ${rDislikeClass}" onclick="reactToComment('${r._id}','dislike', this)">
                      👎 <span>${r.dislikes || 0}</span>
                    </button>
                  </div>
                </div>
              `;
            }).join('');

            const deleteBtn = currentUser && currentUser.isAdmin
              ? `<button class="comment-delete-btn" onclick="deleteComment('${c._id}','${reviewId}')" title="Delete comment">🗑️</button>`
              : '';

            return `
              <div class="comment-wrapper" id="comment-wrapper-${c._id}">
                <div class="comment-item" id="comment-${c._id}">
                  <div class="comment-user">${avatarHtml} <span class="comment-name">${esc(c.userName || 'Anonymous')}</span> ${badgeHtml} ${timeHtml}
                    <span class="reply-btn" onclick="showReplyForm('${reviewId}', '${c._id}')">Reply</span>${deleteBtn}
                  </div>
                  <div class="comment-text">${esc(c.text)}</div>
                  <div class="comment-actions">
                    <button class="comment-react-btn ${likeClass}" onclick="reactToComment('${c._id}','like', this)">
                      👍 <span>${c.likes || 0}</span>
                    </button>
                    <button class="comment-react-btn ${dislikeClass}" onclick="reactToComment('${c._id}','dislike', this)">
                      👎 <span>${c.dislikes || 0}</span>
                    </button>
                  </div>
                </div>
                <div id="replies-${c._id}">${repliesHtml}</div>
                <div class="reply-form" id="reply-form-${c._id}">
                  <input type="text" class="comment-input" id="reply-input-${c._id}" placeholder="Write a reply..." onkeypress="if(event.key==='Enter') submitComment('${reviewId}', '${c._id}')">
                  <button class="comment-submit" onclick="submitComment('${reviewId}', '${c._id}')" id="reply-btn-${c._id}">Post</button>
                </div>
              </div>
            `;
          }).join('');
        }
      } catch (err) {
        list.innerHTML = '<p style="font-size:0.7rem;color:#f55;text-align:center">Could not load comments.</p>';
      }
    }

    function showReplyForm(reviewId, parentId) {
      if (!currentUser) { showLoginToast(); return; }
      const form = document.getElementById(`reply-form-${parentId}`);
      if (form) form.classList.toggle('active');
    }

    async function submitComment(reviewId, parentId = null) {
      const inputId = parentId ? `reply-input-${parentId}` : `comment-input-${reviewId}`;
      const btnId = parentId ? `reply-btn-${parentId}` : `comment-btn-${reviewId}`;
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      const text = input.value.trim();

      if (!text) return;
      if (!currentUser) {
        showLoginToast();
        return;
      }

      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = '...';

      try {
        const res = await fetch(`/api/reviews/${reviewId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, parentId })
        });
        if (!res.ok) {
          const data = await res.json();
          alert(data.error || 'Failed to post comment');
        } else {
          input.value = '';
          const form = document.getElementById(`reply-form-${parentId}`);
          if (form) form.classList.remove('active');
          loadComments(reviewId);
        }
      } catch (err) {
        alert('Network error. Please try again.');
      }
      btn.disabled = false;
      btn.textContent = originalText;
    }

    async function reactToComment(commentId, type, btn) {
      if (!currentUser) { showLoginToast(); return; }

      const likeBtn = btn.parentElement.querySelector('.comment-react-btn:nth-child(1)');
      const dislikeBtn = btn.parentElement.querySelector('.comment-react-btn:nth-child(2)');
      const likeSpan = likeBtn.querySelector('span');
      const dislikeSpan = dislikeBtn.querySelector('span');

      const isLike = type === 'like';

      try {
        const res = await fetch(`/api/comments/${commentId}/react`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type })
        });
        if (!res.ok) throw new Error('Reaction failed');
        const data = await res.json();

        likeSpan.textContent = data.likes || 0;
        dislikeSpan.textContent = data.dislikes || 0;

        likeBtn.classList.toggle('liked', data.userReaction === 'like');
        dislikeBtn.classList.toggle('disliked', data.userReaction === 'dislike');
      } catch (err) {
        console.error('Comment react error', err);
      }
    }

    // ─── DELETE COMMENT (Admin) ───
    async function deleteComment(commentId, reviewId) {
      if (!confirm('Delete this comment and its replies?')) return;
      try {
        const res = await fetch(`/api/comments/${commentId}`, { method: 'DELETE' });
        if (!res.ok) {
          const data = await res.json();
          showToast(data.error || 'Failed to delete', 'error');
          return;
        }
        showToast('Comment deleted', 'success');
        loadComments(reviewId);
      } catch (err) {
        showToast('Network error', 'error');
      }
    }

    // ─── TOAST HELPERS ───
    function showToast(msg, type = 'warning') {
      let toast = document.querySelector('.custom-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'custom-toast';
        document.body.appendChild(toast);
      }
      toast.className = 'custom-toast ' + type;
      toast.textContent = msg;
      requestAnimationFrame(() => toast.classList.add('active'));
      setTimeout(() => toast.classList.remove('active'), 3000);
    }

    function showLoginToast() {
      showToast('Please log in to perform this action.', 'warning');
    }

    // ─── HELPERS ───
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // Avatar helper – image or colored-initial fallback
    const AVATAR_COLORS = ['#FF073A', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#00bcd4', '#009688', '#4caf50', '#ff9800'];
    function buildAvatarHtml(avatarUrl, name) {
      if (avatarUrl) {
        return `<img class="comment-avatar" src="${esc(avatarUrl)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><span class="comment-avatar-initial" style="display:none;background:${AVATAR_COLORS[((name || 'U').charCodeAt(0)) % AVATAR_COLORS.length]}">${esc((name || 'U')[0])}</span>`;
      }
      const color = AVATAR_COLORS[((name || 'U').charCodeAt(0)) % AVATAR_COLORS.length];
      return `<span class="comment-avatar-initial" style="background:${color}">${esc((name || 'U')[0])}</span>`;
    }

    // Relative timestamp for comments (e.g. "2m ago", "3h ago", "5 Apr")
    function formatCommentTime(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    }

    // ─── INIT ───
    checkAuth().then(() => initMovieContext());
  </script>
