    <style>
        body {
            text-align: center;
            padding-bottom: 80px;
        }

        /* CONTAINER */
        .container {
            margin-top: 60px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 80px 40px;
            padding: var(--sp-5);
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* BOXES */
        .box {
            width: 220px;
            height: 330px;
            position: relative;
            cursor: pointer;
            transition: all 0.4s var(--ease-spring);
            flex: 0 0 auto;
        }

        .box-inner {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--mt-glass-border);
            transition: all var(--duration-normal) ease;
        }

        .box:hover {
            transform: translateY(-10px);
        }

        .box:hover .box-inner {
            box-shadow: 0 0 30px var(--mt-primary-glow), var(--shadow-lg);
            border-color: var(--mt-border-accent-hover);
        }

        .box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.6s ease;
            filter: brightness(75%);
        }

        .box:hover img {
            transform: scale(1.1);
            filter: brightness(100%);
        }

        .category-label {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-display);
            font-size: var(--fs-sm);
            font-weight: 700;
            color: var(--mt-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            transition: all 0.4s ease;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 12px var(--mt-primary-glow);
        }

        .box:hover .category-label {
            opacity: 1;
            top: -45px;
            text-shadow: 0 0 20px var(--mt-primary-glow);
            transform: translateX(-50%) scale(1.1);
        }

        /* HEADING */
        .page-header {
            margin-top: 140px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: white;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--mt-primary), var(--mt-cyan));
            border-radius: 2px;
        }

        /* Pulsing dot indicator */
        .page-header h1::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -30px;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--mt-primary);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; box-shadow: 0 0 0 0 var(--mt-primary-glow); }
            50% { opacity: 1; box-shadow: 0 0 15px var(--mt-primary-glow); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .box {
                width: 180px;
                height: 270px;
            }
            .container {
                gap: 60px 25px;
            }
        }

        @media (max-width: 480px) {
            .box {
                width: 150px;
                height: 225px;
            }
            .container {
                gap: 50px 20px;
            }
        }
    </style>
</head>

    <!-- Page Scripts -->
    <script>
        // Auth Guard
        function updateUIWithUser(user) {
            if (!user) return;
            const profileLink = Array.from(document.querySelectorAll('.site-nav a')).find(a => a.href.includes('profile.html'));
            if (profileLink) profileLink.textContent = user.fullName.split(' ')[0] + "'s Profile";

            // Admin toggle
            if (user.isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
                if (typeof injectAdminModal === 'function') injectAdminModal();
            }
        }

        // Initialize UI with user data if available
        if (window.__USER__) {
            updateUIWithUser(window.__USER__);
        } else {
            window.addEventListener('authReady', (e) => updateUIWithUser(e.detail), { once: true });
        }

        // Modal container for admin.js
        const modalContainer = document.createElement('div');
        modalContainer.id = 'admin-modal-container';
        document.body.appendChild(modalContainer);

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof injectAdminModal === 'function') injectAdminModal();
        });

        // FIXED: opacity was 1, should be 0 for the fade-in to work
        window.addEventListener('DOMContentLoaded', () => {
            gsap.from(".box", {
                duration: 1,
                opacity: 0,
                y: 30,
                stagger: 0.1,
                ease: "power3.out"
            });
        });
    </script>
