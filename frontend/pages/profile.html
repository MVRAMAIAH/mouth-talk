<head>

    <link rel="stylesheet" href="../assets/css/beast-mode.css">

</head>

<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Header -->
  <div class="ambient-glow"></div>
  <header class="site-header">
    <a href="../index.html" class="site-logo">MTALK</a>
    <button class="hamburger-btn" aria-label="Toggle navigation menu" onclick="toggleMenu()">☰</button>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="../index.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="location.html">Location</a>
      <a href="about.html">About</a>
    </nav>
  </header>

    <!-- Follows Modal -->
    <div class="modal-overlay" id="followsModal" onclick="closeFollowsModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Followers</h3>
                <button class="modal-close" onclick="closeFollowsModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- List items will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Profile Section -->
    <div class="profile-container">
        <img id="profile-img" class="profile-img"
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Icon-round-Question_mark.svg/768px-Icon-round-Question_mark.svg.png"
            alt="User">

        <div class="user-info">
            <div id="auth-badge" class="badge">-</div>
            <h2 class="username-row">
                <span id="name-text">Loading...</span>
                <span class="verified-badge" id="verified-badge"></span>
            </h2>
            <p id="display-contact">-</p>
            <div class="stats-bar" style="border-top: 1px solid rgba(255, 255, 255, 0.1); margin-top: 20px;">
                <div class="stat-item" onclick="openFollowsModal('followers')">
                    <span class="stat-value" id="follower-count">0</span>
                    <span class="stat-label">Followers</span>
                </div>
                <div class="stat-item" onclick="openFollowsModal('following')">
                    <span class="stat-value" id="following-count">0</span>
                    <span class="stat-label">Following</span>
                </div>
            </div>
        </div>

        <!-- Read-only info display -->
        <div class="info-display" id="info-display" style="display:none;">
            <div class="info-display-title">Your Movie DNA</div>
            <div class="info-row">
                <span class="info-label">Name</span>
                <span class="info-value" id="ro-name">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Mother Tongue</span>
                <span class="info-value" id="ro-tongue">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Fav Actor</span>
                <span class="info-value" id="ro-actor">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Fav Actress</span>
                <span class="info-value" id="ro-actress">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Fav Director</span>
                <span class="info-value" id="ro-director">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Fav Composer</span>
                <span class="info-value" id="ro-composer">—</span>
            </div>
        </div>

        <button class="btn-edit" id="btn-edit" onclick="toggleEdit()">✎ Edit Profile</button>

        <div class="edit-section" id="edit-section">
            <div class="input-group">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#FF073A;">Name</label>
                <input type="text" id="user-name-input" class="premium-input" style="width:100%"
                    placeholder="Your Name">
            </div>
            <div class="input-group" id="edit-prefs" style="display:none;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#FF073A;">Mother Tongue</label>
                <input type="text" id="tongue-input" class="premium-input" style="width:100%"
                    placeholder="Mother Tongue">
            </div>
            <div class="input-group" id="edit-actor-wrap" style="display:none;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#FF073A;">Favourite
                    Actor</label>
                <input type="text" id="actor-input" class="premium-input" style="width:100%"
                    placeholder="Favourite Actor">
            </div>
            <div class="input-group" id="edit-actress-wrap" style="display:none;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#FF073A;">Favourite
                    Actress</label>
                <input type="text" id="actress-input" class="premium-input" style="width:100%"
                    placeholder="Favourite Actress">
            </div>
            <div class="input-group" id="edit-director-wrap" style="display:none;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#FF073A;">Favourite
                    Director</label>
                <input type="text" id="director-input" class="premium-input" style="width:100%"
                    placeholder="Favourite Director">
            </div>
            <div class="input-group" id="edit-composer-wrap" style="display:none;">
                <label style="display:block; margin-bottom:8px; font-size:12px; color:#FF073A;">Favourite
                    Composer</label>
                <input type="text" id="composer-input" class="premium-input" style="width:100%"
                    placeholder="Favourite Composer">
            </div>
            <button class="btn-update premium-btn" style="margin-top: 20px;" onclick="updateProfile()">Update
                Profile</button>
        </div>

        <button class="btn-logout premium-btn" style="margin-top: 15px;" onclick="logout()">Logout Session</button>

        <!-- Firebase SDKs for logout -->
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
        <script src="../assets/js/firebase-init.js"></script>
        <script src="../assets/js/premium-buttons.js"></script>
        <script src="../assets/js/responsive.js"></script>

        <script>
            const BADGE_MAP = {
                rocky: { emoji: '💪', name: 'ROCKY' },
                ram: { emoji: '🌸', name: 'RAM' },
                shivaji: { emoji: '🏛️', name: 'SHIVAJI' },
                anil: { emoji: '👨‍👩‍👧‍👦', name: 'ANIL' }
            };

            async function fetchUserData() {
                try {
                    const res = await fetch('/api/auth/me', { credentials: 'include' });
                    if (!res.ok) {
                        window.location.href = 'login.html';
                        return;
                    }
                    const userData = await res.json();

                    document.getElementById('name-text').textContent = userData.fullName;
                    document.getElementById('user-name-input').value = userData.fullName;
                    document.getElementById('display-contact').textContent = (userData.email || userData.phone || '-');
                    document.getElementById('info-display').setAttribute('data-uid', userData.uid);
                
                    // Display Follow Stats
                    document.getElementById('follower-count').textContent = userData.followerCount || 0;
                    document.getElementById('following-count').textContent = userData.followingCount || 0;
                    
                    // Badge Logic
                    const bType = userData.badge || 'rocky';
                    document.getElementById('auth-badge').textContent = (userData.provider || 'JWT') + ' authenticated';

                    if (userData.picture) {
                        document.getElementById('profile-img').src = userData.picture;
                    }

                    // Verified badge with emoji
                    if (userData.badge && BADGE_MAP[userData.badge]) {
                        const vb = document.getElementById('verified-badge');
                        vb.textContent = BADGE_MAP[userData.badge].emoji;
                        vb.classList.add('visible');
                    }

                    // Always show Movie DNA section with available data
                    document.getElementById('info-display').style.display = 'block';
                    document.getElementById('ro-name').textContent = userData.fullName || '—';
                    document.getElementById('ro-tongue').textContent = userData.motherTongue || '—';
                    document.getElementById('ro-actor').textContent = userData.actor || '—';
                    document.getElementById('ro-actress').textContent = userData.favouriteActress || '—';
                    document.getElementById('ro-director').textContent = userData.favouriteDirector || '—';
                    document.getElementById('ro-composer').textContent = userData.favouriteComposer || '—';

                    // Show edit pref inputs only if onboarding was completed
                    if (userData.onboardingComplete) {
                        document.getElementById('edit-prefs').style.display = 'block';
                        document.getElementById('edit-actor-wrap').style.display = 'block';
                        document.getElementById('edit-actress-wrap').style.display = 'block';
                        document.getElementById('edit-director-wrap').style.display = 'block';
                        document.getElementById('edit-composer-wrap').style.display = 'block';

                        if (userData.motherTongue) document.getElementById('tongue-input').value = userData.motherTongue;
                        if (userData.actor) document.getElementById('actor-input').value = userData.actor;
                        if (userData.favouriteActress) document.getElementById('actress-input').value = userData.favouriteActress;
                        if (userData.favouriteDirector) document.getElementById('director-input').value = userData.favouriteDirector;
                        if (userData.favouriteComposer) document.getElementById('composer-input').value = userData.favouriteComposer;
                    }

                    document.getElementById('loading-overlay').style.display = 'none';
                } catch (err) {
                    console.error(err);
                    window.location.href = 'login.html';
                }
            }

            function toggleEdit() {
                const section = document.getElementById('edit-section');
                const btn = document.getElementById('btn-edit');
                const infoDisplay = document.getElementById('info-display');
                if (section.classList.contains('visible')) {
                    section.classList.remove('visible');
                    if (infoDisplay && infoDisplay.textContent.trim()) infoDisplay.style.display = 'block';
                    btn.innerHTML = '✎ Edit Profile';
                } else {
                    section.classList.add('visible');
                    if (infoDisplay) infoDisplay.style.display = 'none';
                    btn.innerHTML = '✕ Cancel';
                }
            }

            async function updateProfile() {
                const fullName = document.getElementById('user-name-input').value;

                const motherTongue = document.getElementById('tongue-input') ? document.getElementById('tongue-input').value : undefined;
                const actor = document.getElementById('actor-input') ? document.getElementById('actor-input').value : undefined;
                const favouriteActress = document.getElementById('actress-input') ? document.getElementById('actress-input').value : undefined;
                const favouriteDirector = document.getElementById('director-input') ? document.getElementById('director-input').value : undefined;
                const favouriteComposer = document.getElementById('composer-input') ? document.getElementById('composer-input').value : undefined;

                try {
                    const res = await fetch('/api/auth/profile', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fullName, motherTongue, actor, favouriteActress, favouriteDirector, favouriteComposer })
                    });

                    if (res.ok) {
                        const data = await res.json();
                        document.getElementById('name-text').textContent = data.user.fullName;
                        document.getElementById('ro-name').textContent = data.user.fullName || '—';
                        if (motherTongue) document.getElementById('ro-tongue').textContent = motherTongue;
                        if (actor) document.getElementById('ro-actor').textContent = actor;
                        if (favouriteActress) document.getElementById('ro-actress').textContent = favouriteActress;
                        if (favouriteDirector) document.getElementById('ro-director').textContent = favouriteDirector;
                        if (favouriteComposer) document.getElementById('ro-composer').textContent = favouriteComposer;
                        toggleEdit();
                        alert("Profile updated successfully!");
                    } else {
                        const error = await res.json();
                        alert(error.error || "Failed to update profile");
                    }
                } catch (err) {
                    console.error(err);
                    alert("An error occurred. Please try again.");
                }
            }

            async function logout() {
                try {
                    // 1. Clear backend JWT cookie
                    await fetch('/api/auth/logout', { method: 'POST' });

                    // 2. Firebase signOut
                    await firebase.auth().signOut();

                    // 3. Redirect
                    window.location.href = 'login.html';
                } catch (err) {
                    console.error(err);
                    location.reload();
                }
            }

            fetchUserData();
        </script>

    <!-- Social List Logic -->
    <script>
        async function openFollowsModal(type) {
            const modal = document.getElementById('followsModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            // Find current user's UID (it's stored in public window.currentUser from profile.html logic or we can fetch it again)
            // But we already have it from the /me call which filled userData
            const uid = document.getElementById('info-display').getAttribute('data-uid');

            title.textContent = type === 'followers' ? 'Followers' : 'Following';
            body.innerHTML = '<div class="search-loading"><div class="spinner"></div></div>';
            modal.classList.add('active');

            try {
                const res = await fetch(`/api/users/${uid}/${type}`);
                if (!res.ok) throw new Error('Fetch failed');
                const users = await res.json();

                if (users.length === 0) {
                    body.innerHTML = `<div class="search-no-results">No ${type} yet.</div>`;
                    return;
                }

                body.innerHTML = users.map(u => `
                    <div class="list-item">
                        <img class="list-avatar" src="${u.picture || 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Icon-round-Question_mark.svg/768px-Icon-round-Question_mark.svg.png'}" alt="" onclick="window.location.href='user-details.html?id=${u.uid}'">
                        <div class="list-info" onclick="window.location.href='user-details.html?id=${u.uid}'">
                            <div class="list-name">${esc(u.fullName)}</div>
                            <div class="list-badge">${u.badge ? u.badge.toUpperCase() : 'MEMBER'}</div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error(err);
                body.innerHTML = '<div class="search-no-results">Failed to load list.</div>';
            }
        }

        function closeFollowsModal() {
            document.getElementById('followsModal').classList.remove('active');
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }
    </script>

        <div class="modal-content" onclick="event.stopPropagation()">

            <div class="modal-body" id="modalBody">
