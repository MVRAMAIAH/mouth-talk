<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MTALK</title>
  <meta name="description" content="Sign in to MTALK - Access movie reviews, ratings, and community discussions.">
  <link rel="icon" href="https://t3.ftcdn.net/jpg/06/76/63/78/360_F_676637882_ywOxjtsIXUK79F6lKVtXAwYiI9zZ2h3H.jpg" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="../assets/css/performance.css">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/premium-buttons.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
    }

    /* LOGIN CONTAINER */
    .login-container {
      margin-top: 140px;
      text-align: center;
      padding: var(--sp-10);
      background: var(--mt-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 30px rgba(255, 7, 58, 0.15), var(--shadow-lg);
      width: 90%;
      max-width: 450px;
      border: 1px solid var(--mt-glass-border);
      position: relative;
      overflow: hidden;
    }

    /* Subtle top gradient accent */
    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--mt-primary), var(--mt-cyan), var(--mt-primary));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .login-container h2 {
      font-family: var(--font-display);
      font-size: 28px;
      margin-bottom: 25px;
      text-shadow: 0 0 20px var(--mt-primary-glow);
      background: linear-gradient(135deg, #fff, var(--mt-primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* TABS */
    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 2px solid var(--mt-border);
    }

    .tab {
      flex: 1;
      padding: var(--sp-3);
      cursor: pointer;
      transition: var(--duration-normal);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: var(--fs-sm);
      color: var(--mt-text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      background: none;
    }

    .tab.active {
      color: var(--mt-primary);
      border-bottom: 2px solid var(--mt-primary);
    }

    .tab:hover:not(.active) {
      color: var(--mt-text-secondary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* FORMS */
    .input-group {
      margin-bottom: var(--sp-4);
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: var(--sp-2);
      font-size: var(--fs-sm);
      color: var(--mt-primary);
      font-family: var(--font-body);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-4);
      width: 100%;
    }

    .google-btn img {
      width: 22px;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
    }

    /* UTILS */
    .loading-spinner {
      display: none;
      margin: 20px auto;
      width: 30px;
      height: 30px;
      border: 4px solid var(--mt-primary-subtle);
      border-top: 4px solid var(--mt-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #recaptcha-container {
      margin: var(--sp-4) 0;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: var(--sp-6) 0;
      gap: var(--sp-4);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--mt-border);
    }

    .divider span {
      font-size: var(--fs-xs);
      color: var(--mt-text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <a href="#login-form" class="skip-link">Skip to login form</a>

  <div class="ambient-glow"></div>

  <!-- HEADER -->
  <header class="site-header">
    <a href="../index.html" class="site-logo">MTALK</a>
    <button class="hamburger-btn" onclick="toggleMenu()" aria-label="Toggle navigation menu">☰</button>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="../index.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="location.html">Location</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <!-- LOGIN FORM -->
  <main id="login-form" class="site-main">
    <div class="login-container">
      <h2>Access MTALK</h2>

      <div class="tabs" role="tablist">
        <button class="tab active" onclick="switchTab('google')" role="tab" aria-selected="true">Google</button>
        <button class="tab" onclick="switchTab('phone')" role="tab" aria-selected="false">Phone OTP</button>
      </div>

      <!-- Google Tab Content -->
      <div id="google-tab" class="tab-content active" role="tabpanel">
        <p style="margin-bottom: 25px; color: var(--mt-text-tertiary); font-size: var(--fs-sm);">One-click secure access</p>
        <button class="google-btn premium-btn" onclick="signInWithGoogle()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
          Sign in with Google
        </button>
      </div>

      <!-- Phone Tab Content -->
      <div id="phone-tab" class="tab-content" role="tabpanel">
        <div id="phone-step-1">
          <div class="input-group">
            <label for="phone-name">Full Name</label>
            <input type="text" id="phone-name" class="premium-input" placeholder="E.g. John Doe">
          </div>
          <div class="input-group">
            <label for="phoneNumber">Mobile Number</label>
            <input type="tel" id="phoneNumber" class="premium-input" placeholder="+91 9876543210">
          </div>
          <div id="recaptcha-container"></div>
          <button id="send-otp-btn" class="premium-btn" style="width:100%" onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="phone-step-2" style="display: none;">
          <div class="input-group">
            <label for="otp-input">Enter 6-digit OTP</label>
            <input type="text" id="otp-input" class="premium-input" maxlength="6"
              style="letter-spacing: 5px; font-size: 20px; text-align: center; font-family: var(--font-display);">
          </div>
          <button class="premium-btn" style="width:100%" onclick="verifyOTP()">Verify & Login</button>
          <p style="margin-top: 15px; font-size: var(--fs-xs); cursor: pointer; color: var(--mt-primary);" onclick="resetPhoneStep()">Change
            Number</p>
        </div>
      </div>

      <div class="loading-spinner" id="loader"></div>
      <div id="error-box" class="error-msg"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-brand">MTALK</div>
    <p class="footer-tagline">Its word of mouth</p>
    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="../index.html">Home</a>
    </div>
    <p class="footer-copy">© 2026 MTALK. All rights reserved.</p>
  </footer>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="../assets/js/firebase-init.js"></script>
  <script src="../assets/js/toast.js"></script>
  <script src="../assets/js/premium-buttons.js"></script>
  <script src="../assets/js/responsive.js"></script>

  <script>
    let confirmationResult = null;

    // UI State Utils
    function switchTab(type) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      if (type === 'google') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('google-tab').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('phone-tab').classList.add('active');
        initRecaptcha();
      }
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
      setTimeout(() => box.style.display = 'none', 5000);
    }

    function toggleLoader(show) {
      document.getElementById('loader').style.display = show ? 'block' : 'none';
      document.querySelectorAll('button').forEach(b => b.disabled = show);
    }

    // Auth Flows
    async function signInWithGoogle() {
      toggleLoader(true);
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        const idToken = await result.user.getIdToken();

        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ idToken })
        });

        if (res.ok) {
          const data = await res.json();
          // Cache user for auth-guard optimistic rendering
          if (data.user) {
            sessionStorage.setItem('mt_user', JSON.stringify(data.user));
          }
          if (data.isNewUser) {
            window.location.href = 'onboarding.html';
          } else {
            window.location.href = '../index.html';
          }
        } else {
          const data = await res.json();
          showError(data.error || 'Login failed');
        }
      } catch (error) {
        console.error(error);
        showError(error.message);
      } finally {
        toggleLoader(false);
      }
    }

    function initRecaptcha() {
      if (window.recaptchaVerifier) return;
      window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'normal',
        'callback': (response) => { }
      });
    }

    async function sendOTP() {
      let phone = document.getElementById('phoneNumber').value.trim();
      const name = document.getElementById('phone-name').value.trim();

      if (!name) return showError("Please enter your name");

      // Clean up phone number: remove spaces, dashes, parentheses
      phone = phone.replace(/\D/g, '');

      // Auto-format for India (+91) if it's 10 digits
      if (phone.length === 10) {
        phone = '+91' + phone;
      } else if (!phone.startsWith('+')) {
        if (phone.length > 0) phone = '+' + phone;
      }

      if (phone.length < 12) {
        return showError("Please enter a valid phone number with country code (e.g. +91...)");
      }

      toggleLoader(true);
      try {
        console.log('Sending OTP to:', phone);
        const appVerifier = window.recaptchaVerifier;
        confirmationResult = await auth.signInWithPhoneNumber(phone, appVerifier);
        document.getElementById('phone-step-1').style.display = 'none';
        document.getElementById('phone-step-2').style.display = 'block';
      } catch (error) {
        console.error('Firebase Check Satus OTP Error:', error);
        showError(error.message);
      } finally {
        toggleLoader(false);
      }
    }

    async function verifyOTP() {
      const code = document.getElementById('otp-input').value;
      const name = document.getElementById('phone-name').value;

      if (code.length !== 6) return showError("6-digit code required");

      toggleLoader(true);
      try {
        const result = await confirmationResult.confirm(code);
        const idToken = await result.user.getIdToken();

        const res = await fetch('/api/auth/phone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ idToken, fullName: name })
        });

        if (res.ok) {
          const data = await res.json();
          // Cache user for auth-guard optimistic rendering
          if (data.user) {
            sessionStorage.setItem('mt_user', JSON.stringify(data.user));
          }
          if (data.isNewUser) {
            window.location.href = 'onboarding.html';
          } else {
            window.location.href = '../index.html';
          }
        } else {
          const data = await res.json();
          showError(data.error || 'Verification failed');
        }
      } catch (error) {
        console.error(error);
        showError(error.message);
      } finally {
        toggleLoader(false);
      }
    }

    function resetPhoneStep() {
      document.getElementById('phone-step-1').style.display = 'block';
      document.getElementById('phone-step-2').style.display = 'none';
      confirmationResult = null;
    }

    // Auto-login check — disabled to prevent redirect loops
  </script>

</body>

</html>
