<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MTALK - The Ultimate Movie Review Destination. Discover, review, and discuss the latest movies across Tollywood, Bollywood, Kollywood, Hollywood and more.">
    <title>MTALK - The Ultimate Movie Destination</title>

    <!-- PERF: Preload critical hero background (943KB, LCP element) -->
    <link rel="preload" href="assets/images/land.webp" as="image" type="image/webp">
    <!-- PERF: Performance CSS loaded FIRST for GPU hints -->
    <link rel="stylesheet" href="assets/css/performance.css">

    <link rel="icon" href="https://t3.ftcdn.net/jpg/06/76/63/78/360_F_676637882_ywOxjtsIXUK79F6lKVtXAwYiI9zZ2h3H.jpg"
        type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/interactive-heading.css">
    <link rel="stylesheet" href="assets/css/premium-buttons.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="assets/css/nav-search.css">
    <link rel="stylesheet" href="assets/css/notifications.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/beast-mode.css">


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background: black;
            background-image: url("assets/images/land.webp");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
            position: relative;
            color: white;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            width: 100%;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #FF073A;
            text-transform: uppercase;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 18px;
            font-weight: 500;
            transition: color 0.3s ease;
            white-space: nowrap;
        }

        .nav-links a:hover {
            color: #FF073A;
        }

        /* BOTTOM SECTION — fixed to bottom of screen */
        .bottom-section {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        /* MARQUEE */
        .marquee-wrapper {
            position: relative;
            overflow: hidden;
            /* Focus the view within the 75vw lens */
            width: 75vw;
            margin: 0 auto 30px;
            height: 320px;
            /* Ample height for the 1.4x zoom expansion */
            display: flex;
            align-items: center;
        }

        .marquee-fade-left,
        .marquee-fade-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100px;
            z-index: 2;
            pointer-events: none;
        }

        .marquee-fade-left {
            left: 0;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.5), transparent);
        }

        .marquee-fade-right {
            right: 0;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.5), transparent);
        }

        .marquee-track {
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 50px 0;
            will-change: transform;
        }

        .marquee-track img {
            width: 140px;
            height: 200px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid rgba(255, 7, 58, 0.2);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            /* Removed transform transition to allow frame-by-frame JS control without lag */
            transition: border-color 0.4s, box-shadow 0.4s;
            will-change: transform;
        }

        .marquee-track img:hover {
            border-color: #FF073A;
            box-shadow: 0 0 20px rgba(255, 7, 58, 0.6);
            z-index: 10;
        }



        /* CTA BUTTON */
        .cta-button {
            display: inline-block;
            margin-top: 20px;
            /* All aesthetics now handled by .premium-btn */
        }

        /* LOGIN TOAST */
        .login-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 7, 58, 0.95);
            color: white;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Orbitron', sans-serif;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s, transform 0.4s;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(255, 7, 58, 0.4);
            text-align: center;
        }

        .login-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .login-toast a {
            color: #fff;
            text-decoration: underline;
            font-weight: bold;
            margin-left: 8px;
        }

        /* Header login link for unauthenticated users */
        .nav-login-link {
            display: none;
        }


        /* ADMIN STUFF */
        .admin-only {
            display: none;
        }

        .add-movie-btn {
            /* Aesthetics now handled by .premium-btn */
            margin-right: 15px;
        }

        @media (max-width: 768px) {
            .heading {
                font-size: 40px;
            }

            .cta-button {
                font-size: 18px;
            }

            .marquee-wrapper {
                width: 80vw;
            }
        }

        @media (max-width: 480px) {
            .heading {
                font-size: 32px;
            }

            .cta-button {
                font-size: 16px;
            }

            .marquee-wrapper {
                width: 90vw;
                height: 180px;
            }

            .movie-card img {
                width: 100px;
                height: 150px;
            }
        }
    </style>
</head>

<body>

    <!-- Login toast notification -->
    <div class="login-toast" id="loginToast">
        Please log in to access this feature.
        <a href="pages/login.html">Log In</a>
    </div>

    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">MTALK</div>
        <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
        <div class="nav-links">
            <button class="add-movie-btn admin-only premium-btn" onclick="openModal()">+ Add Movie</button>
            <a href="index.html">Home</a>
            <a href="#" onclick="handleAuthNav('pages/profile.html'); return false;">Profile</a>
            <a href="#" onclick="handleAuthNav('pages/location.html'); return false;">Location</a>
            <a href="#" onclick="handleAuthNav('pages/about.html'); return false;">About</a>
            <a href="pages/login.html" class="nav-login-link" id="navLoginLink">Login</a>
        </div>
    </div>

    <div id="admin-modal-container"></div>

    <div class="bottom-section">
        <div class="marquee-wrapper">
            <div class="marquee-fade-left"></div>
            <div class="marquee-fade-right"></div>
            <div class="marquee-track" id="marqueeTrack"></div>
        </div>

        <div class="hero-content">
            <h3 class="interactive-heading heading-interactive-trigger" data-text="Its word of mouth"></h3>
            <a href="#" onclick="handleAuthNav('pages/get-started.html'); return false;"
                class="cta-button premium-btn">Get Started</a>
        </div>
    </div>

    <script src="assets/js/admin.js" defer></script>
    <script src="assets/js/interactive-heading.js" defer></script>
    <script src="assets/js/premium-buttons.js" defer></script>
    <script src="assets/js/responsive.js" defer></script>
    <script src="assets/js/nav-search.js" defer></script>
    <script src="assets/js/notifications.js" defer></script>
    <script src="assets/js/beast-mode-nav.js" defer></script>
    <script>
        let globalUser = null;
        let isLoggedIn = false;

        // Show a toast notification prompting login
        function showLoginToast() {
            const toast = document.getElementById('loginToast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Gate navigation behind auth check
        function handleAuthNav(url) {
            if (isLoggedIn) {
                window.location.href = url;
            } else {
                showLoginToast();
            }
        }

        function updateUIWithUser(user) {
            if (!user) return;
            globalUser = user;
            isLoggedIn = true;

            const loginLink = document.getElementById('navLoginLink');
            if (loginLink) loginLink.style.display = 'none';

            const navLinks = document.querySelectorAll('.nav-links a');
            const profileLink = Array.from(navLinks).find(a => a.textContent.includes('Profile'));
            if (profileLink && user.fullName) {
                profileLink.textContent = user.fullName.split(' ')[0] + "'s Profile";
            }

            if (user.isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
            }
        }

        async function init() {
            try {
                // Check if user is logged in by calling the API
                try {
                    const authRes = await fetch('/api/auth/me?lite=true&_t=' + Date.now(), { cache: 'no-store', credentials: 'include' });
                    if (authRes.ok) {
                        const user = await authRes.json();
                        if (user) {
                            updateUIWithUser(user);
                        }
                    } else {
                        // Not logged in — show the login link in nav
                        const loginLink = document.getElementById('navLoginLink');
                        if (loginLink) loginLink.style.display = 'inline-block';
                    }
                } catch (authErr) {
                    console.log('Auth check failed:', authErr);
                    const loginLink = document.getElementById('navLoginLink');
                    if (loginLink) loginLink.style.display = 'inline-block';
                }

                // Fetch movies
                const moviesRes = await fetch('/api/movies').then(res => res.json()).catch(() => []);
                renderMarquee(moviesRes);
            } catch (err) {
                console.error('Init error:', err);
                renderMarquee([]);
            }
        }

        // Start init immediately, don't wait for DOMContentLoaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                if (typeof injectAdminModal === 'function') injectAdminModal();
                init();
            });
        } else {
            if (typeof injectAdminModal === 'function') injectAdminModal();
            init();
        }

        function renderMarquee(movies) {
            const track = document.getElementById('marqueeTrack');
            if (!track || !movies || movies.length === 0) return;

            // PERF: Build all elements into a DocumentFragment first, then append once
            const fragment = document.createDocumentFragment();
            const totalLoops = 3;
            for (let r = 0; r < totalLoops; r++) {
                movies.forEach(m => {
                    const container = document.createElement('div');
                    container.className = 'movie-card';
                    container.style.cssText = 'margin-right:20px;display:inline-block';

                    const img = document.createElement('img');
                    const filename = m.poster.includes('.') ? m.poster : m.poster + '.webp';
                    img.src = m.poster.startsWith('http') ? m.poster : '/assets/images/' + encodeURIComponent(filename);
                    img.alt = m.title;
                    img.className = 'marquee-img';
                    img.loading = 'lazy';
                    img.decoding = 'async';
                    img.onclick = () => location.href = 'pages/movie.html?id=' + m.id;

                    container.appendChild(img);
                    fragment.appendChild(container);
                });
            }
            // Single DOM append — avoids N reflows
            track.appendChild(fragment);

            startScroll(track);
        }

        function startScroll(track) {
            let pos = 0;
            const speed = 0.5;
            const oneSetWidth = track.scrollWidth / 3;
            let paused = false;

            const wrapper = document.querySelector('.marquee-wrapper');
            const images = track.querySelectorAll('.marquee-img');
            const imgCount = images.length;

            // PERF: Pre-calculate base positions into typed arrays for cache-friendly iteration
            const baseCenters = new Float64Array(imgCount);
            const currentScales = new Float64Array(imgCount);
            const prevZIndex = new Array(imgCount);
            const prevBorderColor = new Array(imgCount);
            const prevBoxShadow = new Array(imgCount);

            for (let i = 0; i < imgCount; i++) {
                const img = images[i];
                baseCenters[i] = img.parentElement.offsetLeft + img.parentElement.offsetWidth / 2;
                currentScales[i] = 1;
                prevZIndex[i] = '';
                prevBorderColor[i] = '';
                prevBoxShadow[i] = '';
            }

            track.onmouseenter = () => { paused = true; };
            track.onmouseleave = () => { paused = false; };

            // Cache dimensions to avoid layout thrashing inside requestAnimationFrame
            let wrapperRect = wrapper.getBoundingClientRect();
            let wrapperLeft = wrapperRect.left;
            let wrapperWidth = wrapperRect.width;
            let initialTrackLeft = track.getBoundingClientRect().left;

            // PERF: Debounce resize to avoid layout thrashing during resize
            let resizeTimer = null;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    wrapperRect = wrapper.getBoundingClientRect();
                    wrapperLeft = wrapperRect.left;
                    wrapperWidth = wrapperRect.width;
                    const oldTransform = track.style.transform;
                    track.style.transform = 'none';
                    initialTrackLeft = track.getBoundingClientRect().left;
                    track.style.transform = oldTransform;
                }, 150);
            });

            // PERF: Pre-compute constants
            const lerpFactor = 0.15;
            const maxDist = 300;
            const halfPI = Math.PI / 2;
            const DEFAULT_BORDER = 'rgba(255, 7, 58, 0.2)';
            const DEFAULT_SHADOW = '0 10px 25px rgba(0, 0, 0, 0.5)';
            const HOVER_BORDER = '#FF073A';
            const HOVER_SHADOW = '0 0 35px rgba(255, 7, 58, 0.8)';

            function updateZoom() {
                const centerX = wrapperLeft + wrapperWidth / 2;
                const trackLeft = initialTrackLeft + pos;

                // === READ PHASE: Gather all hover states FIRST ===
                // PERF: Batch all :hover checks before any writes to avoid forced style recalc
                const hoverStates = new Uint8Array(imgCount);
                for (let i = 0; i < imgCount; i++) {
                    hoverStates[i] = images[i].matches(':hover') ? 1 : 0;
                }

                // === WRITE PHASE: Apply all style changes ===
                for (let i = 0; i < imgCount; i++) {
                    const img = images[i];
                    const currentCenter = trackLeft + baseCenters[i];
                    const distance = Math.abs(centerX - currentCenter);

                    let targetScale = 1;
                    let targetBorderColor = DEFAULT_BORDER;
                    let targetBoxShadow = DEFAULT_SHADOW;
                    let targetZIndex = '1';

                    if (hoverStates[i]) {
                        targetScale = 1.45;
                        targetZIndex = '100';
                        targetBorderColor = HOVER_BORDER;
                        targetBoxShadow = HOVER_SHADOW;
                    } else if (distance < maxDist) {
                        const relDist = distance / maxDist;
                        targetScale = 1 + (0.35 * Math.cos(relDist * halfPI));
                        targetZIndex = distance < 60 ? '50' : String(10 - (distance / 30) | 0);

                        if (distance < 100) {
                            const opacity = (0.4 * (1 - distance / 100)).toFixed(2);
                            targetBorderColor = `rgba(255, 7, 58, ${opacity})`;
                        }
                    }

                    // PERF: Only touch DOM when values actually changed
                    if (prevZIndex[i] !== targetZIndex) {
                        img.style.zIndex = targetZIndex;
                        prevZIndex[i] = targetZIndex;
                    }
                    if (prevBorderColor[i] !== targetBorderColor) {
                        img.style.borderColor = targetBorderColor;
                        prevBorderColor[i] = targetBorderColor;
                    }
                    if (prevBoxShadow[i] !== targetBoxShadow) {
                        img.style.boxShadow = targetBoxShadow;
                        prevBoxShadow[i] = targetBoxShadow;
                    }

                    // Smoothly lerp scale on GPU
                    currentScales[i] += (targetScale - currentScales[i]) * lerpFactor;
                    img.style.transform = `scale3d(${currentScales[i]}, ${currentScales[i]}, 1) translateZ(0)`;
                }
            }

            function frame() {
                if (!paused && oneSetWidth > 0) {
                    pos -= speed;
                    if (Math.abs(pos) >= oneSetWidth) pos = 0;
                    track.style.transform = 'translate3d(' + pos + 'px, 0, 0)';
                }
                updateZoom();
                requestAnimationFrame(frame);
            }
            frame();
        }
    </script>
</body>

</html>
